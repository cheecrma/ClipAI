[model]
# backend: "llamacpp" (독립 실행, 기본) | "ollama" (개발용) | "remote" (확장)
backend   = "llamacpp"

# --- llamacpp 백엔드 (독립 실행 .exe) ---
# path 의 .gguf 가 없으면 models/ 폴더의 .gguf 를 자동으로 찾는다.
# 다른 모델을 쓰려면 models/ 에 .gguf 를 넣고 path 를 바꾸거나 비워두면 된다.
path         = "models/EXAONE-3.5-2.4B-Instruct-Q4_K_M.gguf"
n_ctx        = 4096          # 입력 ~3,700토큰까지 (모델 최대 32768). 작을수록 RAM↓·긴글 더 빨리
n_gpu_layers = 0            # CPU 빌드는 0 (CUDA 빌드일 때만 -1)
n_threads    = 0            # 0=자동(전체 코어). 낮추면 CPU점유↓/응답 약간↓
n_batch      = 1024         # 입력 ingest 배치 크기(기본 512). 클수록 긴 글 읽기 빠름

# --- ollama 백엔드 (개발/프로토타입용) ---
ollama_model = "exaone3.5:2.4b"
ollama_host  = "http://localhost:11434"

[hotkeys]
# Ctrl+Alt(=AltGr) 영역은 워드/메모장/브라우저 어디서도 안 겹친다.
summarize = "ctrl+alt+a"   # 요약
listify   = "ctrl+alt+s"   # 리스트 정리
translate = "ctrl+alt+d"   # 번역

[ui]
theme             = "dark"
width             = 340          # 카톡 느낌: 좁은 폭
height            = 580          # 긴 세로
restore_clipboard = true
capture_timeout_ms = 350
hide_on_focus_loss = false       # 팝업 밖 클릭 시 자동 닫힘 (꺼짐. Esc/닫기로만)
